spring:
  datasource:
    url: jdbc:h2:mem:finance;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        secure: true
        same-site: lax
