spring:
  datasource:
    url: jdbc:h2:file:/tmp/finance-db;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 60m
      cookie:
        name: JSESSIONID
        path: /
        http-only: true
        secure: true
        same-site: lax
